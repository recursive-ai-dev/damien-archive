# ════════════════════════════════════════════════════════════════════════════
#  PuppyBoot V1 — global configuration
#  Path on the ESP:  /EFI/puppyboot/loader.conf
# ════════════════════════════════════════════════════════════════════════════
#
#  Syntax:  key = value     ('#' and ';' begin comments; whitespace trimmed)
#  Booleans accept: true / false / 1 / 0 / yes / no / on / off / enabled
#
#  This file controls the boot menu itself. Individual boot targets live in
#  one file each under  /EFI/puppyboot/entries/<id>.conf  (see arch.conf).

# ── Menu behaviour ───────────────────────────────────────────────────────────

# Seconds to wait on the menu before auto-booting the default entry.
# 0 boots the default immediately (hold a key during POST to interrupt).
timeout = 5

# Which entry is pre-selected / auto-booted. Accepts:
#   • an entry id   (the <id> part of <id>.conf, e.g. "arch")
#   • an entry name (the 'name =' field, case-insensitive)
#   • a numeric index into the sorted menu (0-based)
default = arch

# Show entries marked 'hidden = true'? Normally false; F12 reveals them
# at runtime regardless of this setting.
show_hidden = false

# Inject network-disabling arguments (ip=off net.ifnames=0) into every Linux
# entry's kernel command line. Per-entry 'no_network' overrides upward only.
no_network = false

# Directory (on this same volume) scanned for per-entry *.conf files.
entries_dir = /EFI/puppyboot/entries

# ── Appearance ───────────────────────────────────────────────────────────────
#
#  Colours accept a name (black, blue, green, cyan, red, magenta, brown,
#  lightgray, darkgray, lightblue, lightgreen, lightcyan, lightred,
#  lightmagenta, yellow, white), a 0x-prefixed hex nibble (0x0A), or a
#  decimal 0–15. These map to the standard VGA/EFI SimpleTextOutput palette.

title        = PuppyBoot V1
fg           = lightgreen      ; normal foreground
bg           = black           ; background
highlight_fg = black           ; selected row foreground
highlight_bg = yellow          ; selected row background
show_help    = true            ; show the key-binding footer
