# ════════════════════════════════════════════════════════════════════════════
#  PuppyBoot V1 — boot entry:  Arch Linux  (EFI-stub path, recommended)
#  Path on the ESP:  /EFI/puppyboot/entries/arch.conf
# ════════════════════════════════════════════════════════════════════════════
#
#  type = linux-stub  →  PuppyBoot LoadImage()s vmlinuz directly (it is a
#  valid PE/COFF EFI application because Arch builds CONFIG_EFI_STUB=y) and
#  passes the initrd(s) via the kernel command line. The kernel's own stub
#  then fetches the memory map and calls ExitBootServices — PuppyBoot never
#  touches boot_params, which is why this path is the most robust.
#
#  REQUIREMENT: for the stub path, the kernel and every initrd/microcode file
#  must live on the ESP (FAT), because the EFI stub loads them through the
#  firmware's SimpleFileSystem before pivoting to the real root. The Arch
#  installer's `/boot` on the ESP satisfies this. (Use type = linux-handover
#  only for kernels too old to self-load initrds, ≤ ~5.7.)

name   = Arch Linux
type   = linux-stub

# Kernel and initramfs paths are POSIX-style ('/'); PuppyBoot translates to
# the UEFI backslash form internally. These are paths *within the ESP*.
kernel = /EFI/arch/vmlinuz-linux

# CPU microcode MUST be the first initrd image the kernel sees. PuppyBoot
# emits 'microcode' ahead of every 'initrd' on the command line for you.
microcode = /EFI/arch/intel-ucode.img
initrd    = /EFI/arch/initramfs-linux.img

# Kernel command line. Point root= at your actual root filesystem.
#   • PARTUUID is the GPT unique partition GUID (lsblk -o NAME,PARTUUID).
#   • You may instead use root=UUID=... (filesystem UUID from blkid) or
#     root=LABEL=... — anything your initramfs understands.
# REPLACE the PARTUUID below with your root partition's real value.
cmdline = root=PARTUUID=REPLACE-WITH-ROOT-PARTUUID rw quiet loglevel=3

# Optional: pin which partition the kernel/initrd files are read from. If
# omitted, PuppyBoot reads them from the ESP it booted from. Use this only
# when the kernel lives on a *different* volume than PuppyBoot itself.
# part_uuid  = 1234ABCD-...        ; PARTUUID or FS-UUID of that volume
# part_label = EFI                 ; or match by GPT label

# Menu ordering (ascending). Lower numbers appear first.
order = 10

# Flags (all default false):
# hidden     = false   ; omit from the menu unless F12 pressed
# recovery   = false   ; append single  systemd.unit=rescue.target
# ram_only   = false   ; append  rd.live.ram=1  (copy image to RAM)
# no_network = false   ; append  ip=off net.ifnames=0
