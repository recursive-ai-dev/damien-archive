# ════════════════════════════════════════════════════════════════════════════
#  PuppyBoot V1 — boot entry:  AIOS native kernel  (ELF64 + LOADER_PARAMS)
#  Path on the ESP:  /EFI/puppyboot/entries/aios.conf
# ════════════════════════════════════════════════════════════════════════════
#
#  type = aios  →  PuppyBoot parses an ELF64 kernel, copies its PT_LOAD
#  segments to physical memory, captures the GOP framebuffer + UEFI memory
#  map, builds the 80-byte LOADER_PARAMS block (Custom-OS-Manual §3 v2.3),
#  calls ExitBootServices itself, and jumps to the ELF entry point with
#  RDI = &LOADER_PARAMS (SysV AMD64 ABI). This is the future AIOS boot path.

name   = AIOS (native)
type   = aios

# The AIOS kernel ELF (path within the ESP, or set part_uuid/part_label to
# read it from another GPT volume — including an ext4 root).
kernel = /EFI/aios/aios-kernel.elf

# Optional command line. AIOS reads it from LOADER_PARAMS if your kernel
# wires that up; harmless if ignored.
cmdline =

# Load-address hint (hex). The loader honours the ELF's own p_paddr/p_vaddr
# and only uses this if the segments are position-independent.
load_addr = 0x100000

order = 20

# Read the kernel from a specific volume instead of the boot ESP:
# part_uuid  = 0FC63DAF-...        ; PARTUUID or FS-UUID
# part_label = AIOS
