# ════════════════════════════════════════════════════════════════════════════
#  PuppyBoot V1 — boot entry:  Windows Boot Manager  (chainload path)
#  Path on the ESP:  /EFI/puppyboot/entries/windows.conf
# ════════════════════════════════════════════════════════════════════════════
#
#  type = chain  →  PuppyBoot LoadImage()/StartImage()s an arbitrary EFI
#  binary and hands the firmware straight to it. Use this for the Windows
#  Boot Manager, another bootloader (systemd-boot, rEFInd, GRUB), or any
#  vendor EFI tool. No command line is constructed; the target owns its boot.

name  = Windows
type  = chain

# The EFI binary to launch (path within the ESP). 'chainload' and 'kernel'
# are interchangeable for chain entries; 'chainload' reads more clearly.
chainload = /EFI/Microsoft/Boot/bootmgfw.efi

order = 50

# Mark hidden if you only want it reachable via F12:
# hidden = true
